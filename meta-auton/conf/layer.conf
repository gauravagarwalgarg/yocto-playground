# Layer configuration for meta-auton
# Custom distro + BSP layer for embedded Linux targets
# Supports: qemu-arm64, beaglebone-black, raspberrypi5

BBPATH .= ":${LAYERDIR}"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "meta-auton"
BBFILE_PATTERN_meta-auton = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-auton = "10"

LAYERDEPENDS_meta-auton = "core"

# Scarthgap LTS baseline + future releases
LAYERSERIES_COMPAT_meta-auton = "scarthgap styhead"
