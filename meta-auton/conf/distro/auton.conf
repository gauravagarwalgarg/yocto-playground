# Auton Embedded Linux Distribution
#
# A minimal, systemd-based embedded Linux distribution targeting
# BeagleBone Black and Raspberry Pi 5. Built on Yocto Scarthgap LTS
# with Linux kernel 6.12 LTS.

DISTRO = "auton"
DISTRO_NAME = "Auton Embedded Linux"
DISTRO_VERSION = "1.0.0"
DISTRO_CODENAME = "genesis"

# Maintainer
MAINTAINER = "Gaurav Agarwal <gauravagarwalgarg@gmail.com>"

# Base distro features
DISTRO_FEATURES = " \
    systemd \
    usrmerge \
    ipv4 \
    ipv6 \
    wifi \
    bluetooth \
    usbhost \
    pam \
    seccomp \
"

# Remove sysvinit (systemd only)
DISTRO_FEATURES:remove = "sysvinit"

# Init manager
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager = "shadow-base"

# Package management
PACKAGE_CLASSES = "package_ipk"

# Kernel preference: Linux 6.12 LTS from meta-auton
PREFERRED_PROVIDER_virtual/kernel = "linux-auton"
PREFERRED_VERSION_linux-auton = "6.12%"

# Toolchain
GCCVERSION = "13.%"
GLIBCVERSION = "2.39%"

# Security hardening
SECURITY_CFLAGS = "-fstack-protector-strong -D_FORTIFY_SOURCE=2"
SECURITY_LDFLAGS = "-Wl,-z,relro,-z,now"

# Image defaults
IMAGE_FSTYPES = "tar.xz wic wic.bmap"

# SDK
SDK_NAME = "${DISTRO}-${TCLIBC}-${SDKMACHINE}-${IMAGE_BASENAME}-${TUNE_PKGARCH}-${MACHINE}"

# Version tracking
DISTRO_VERSION[vardepsexclude] = "DATE"
SDK_VERSION = "${DISTRO_VERSION}"
