#@TYPE: Machine
#@NAME: QEMU ARM 32-bit
#@DESCRIPTION: QEMU ARM machine for local development and CI (vexpress-a15)
#
# Use this for WSL/local builds where you don't have hardware.
# Run with: runqemu qemu-arm nographic

require conf/machine/include/arm/armv7a/tune-cortexa15.inc
require conf/machine/include/qemu.inc

PREFERRED_PROVIDER_virtual/kernel = "linux-auton"
PREFERRED_VERSION_linux-auton = "6.12%"

KERNEL_IMAGETYPE = "zImage"

# QEMU settings
QB_SYSTEM_NAME = "qemu-system-arm"
QB_MACHINE = "-machine vexpress-a15"
QB_CPU = "-cpu cortex-a15"
QB_MEM = "-m 1024"
QB_KERNEL_CMDLINE_APPEND = "console=ttyAMA0,115200 root=/dev/vda rw"
QB_DEFAULT_FSTYPE = "ext4"
QB_TAP_OPT = "-netdev tap,id=net0,ifname=@TAP@,script=no,downscript=no"
QB_NETWORK_DEVICE = "-device virtio-net-device,netdev=net0,mac=@MAC@"
QB_DRIVE_TYPE = "/dev/vd"
QB_ROOTFS_OPT = "-drive id=disk0,file=@ROOTFS@,if=none,format=raw -device virtio-blk-device,drive=disk0"
QB_SERIAL_OPT = "-serial mon:stdio"
QB_GRAPHICS = ""

MACHINE_FEATURES = "usbhost vfat ext2 screen alsa ethernet"
MACHINE_EXTRA_RRECOMMENDS = "kernel-modules"

SERIAL_CONSOLES = "115200;ttyAMA0"
IMAGE_FSTYPES = "tar.xz ext4 wic"
