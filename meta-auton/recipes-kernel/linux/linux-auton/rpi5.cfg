# Raspberry Pi 5 kernel config fragment
# BCM2712 / Cortex-A76 specific options

CONFIG_ARCH_BCM2835=y
CONFIG_ARM64=y

# RPi5 PCIe (RP1 southbridge)
CONFIG_PCIE_BRCMSTB=y
CONFIG_PCI=y

# GPU (VideoCore VII)
CONFIG_DRM=y
CONFIG_DRM_V3D=y
CONFIG_DRM_VC4=y

# SD / eMMC
CONFIG_MMC=y
CONFIG_MMC_BCM2835=y
CONFIG_MMC_SDHCI_IPROC=y

# USB (xHCI via RP1)
CONFIG_USB_XHCI_PLATFORM=y

# WiFi (BCM43455)
CONFIG_BRCMFMAC=m
CONFIG_BRCMUTIL=m

# Bluetooth
CONFIG_BT=y
CONFIG_BT_HCIUART=y
CONFIG_BT_BCM=y

# Camera (libcamera / ISP)
CONFIG_VIDEO_BCM2835_UNICAM=m
CONFIG_VIDEO_V4L2=y

# Thermal
CONFIG_BCM2835_THERMAL=y

# RTC (RPi5 has onboard RTC)
CONFIG_RTC_DRV_PCF85063=y

# Fan control (PWM)
CONFIG_PWM=y
CONFIG_PWM_BCM2835=y
