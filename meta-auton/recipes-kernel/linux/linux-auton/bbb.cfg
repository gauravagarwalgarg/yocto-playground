# BeagleBone Black kernel config fragment
# AM335x / Cortex-A8 specific options

CONFIG_ARCH_OMAP2PLUS=y
CONFIG_SOC_AM33XX=y
CONFIG_OMAP_RESET_CLOCKS=y
CONFIG_ARM_THUMBEE=y
CONFIG_ARM_ERRATA_430973=y

# TI AM335x peripherals
CONFIG_TI_CPSW=y
CONFIG_TI_CPTS=y
CONFIG_OMAP_USB2=y
CONFIG_USB_MUSB_HDRC=y
CONFIG_USB_MUSB_DSPS=y
CONFIG_USB_GADGET=y

# PRU (Programmable Real-time Unit)
CONFIG_REMOTEPROC=y
CONFIG_PRUSS_REMOTEPROC=y

# Display
CONFIG_DRM=y
CONFIG_DRM_TILCDC=y

# ADC
CONFIG_TI_AM335X_ADC=y
CONFIG_IIO=y

# eMMC / SD
CONFIG_MMC=y
CONFIG_MMC_OMAP_HS=y
